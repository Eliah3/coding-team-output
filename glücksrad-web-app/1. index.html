<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Tic-Tac-Toe</h1>
            <p class="subtitle">Spiel gegen die KI</p>
        </header>

        <div class="game-info">
            <div class="player-indicator" id="currentPlayer">
                <span class="player-x">X</span> ist dran
            </div>
            <div class="score-board">
                <div class="score">
                    <span class="player-x">X</span>: <span id="scoreX">0</span>
                </div>
                <div class="score">
                    <span class="player-o">O</span> (KI): <span id="scoreO">0</span>
                </div>
            </div>
        </div>

        <div class="game-board" id="board">
            <button class="cell" data-index="0"></button>
            <button class="cell" data-index="1"></button>
            <button class="cell" data-index="2"></button>
            <button class="cell" data-index="3"></button>
            <button class="cell" data-index="4"></button>
            <button class="cell" data-index="5"></button>
            <button class="cell" data-index="6"></button>
            <button class="cell" data-index="7"></button>
            <button class="cell" data-index="8"></button>
        </div>

        <div class="game-controls">
            <button id="restartBtn" class="btn btn-primary">Neues Spiel</button>
            <button id="difficultyBtn" class="btn btn-secondary">Schwierigkeit: Normal</button>
        </div>

        <div class="game-message" id="message"></div>

        <footer>
            <p>Wähle eine Zelle, um zu spielen</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
